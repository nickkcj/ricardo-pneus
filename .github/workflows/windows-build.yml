name: Build & Release Windows

on:
  # Publica uma Release automaticamente quando a versão (package.json) muda na main.
  push:
    branches: [main]
  # Build manual: gera só o instalador como artifact (sem Release).
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  # Descobre a versão e decide se deve publicar (evita rebuild quando a versão não mudou).
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      release: ${{ steps.v.outputs.release }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"      # build manual: só artifact
          elif gh release view "v$VERSION" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release=skip" >> "$GITHUB_OUTPUT"        # versão já publicada: não builda
          else
            echo "release=true" >> "$GITHUB_OUTPUT"        # versão nova: builda e publica
          fi

  build-windows:
    needs: check
    if: needs.check.outputs.release != 'skip'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache do Rust no escopo da main → reaproveitado em toda release seguinte.
      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build backend sidecar (.exe)
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/build-backend.ps1

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # Versão nova → builda assinado, cria a Release + latest.json (auto-update).
      - name: Build & Release (Tauri)
        if: needs.check.outputs.release == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.check.outputs.version }}
          releaseName: "Ricardo Pneus v${{ needs.check.outputs.version }}"
          releaseDraft: false
          prerelease: false

      # Build manual (workflow_dispatch): apenas o instalador como artifact.
      - name: Build Tauri (manual, sem release)
        if: needs.check.outputs.release == 'false'
        run: pnpm tauri build

      - name: Upload installer (manual)
        if: needs.check.outputs.release == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ricardo-pneus-windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
